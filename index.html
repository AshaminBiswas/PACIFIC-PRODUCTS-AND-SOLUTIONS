<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="dynamic-favicon" type="image/png" href="/src/image/logo/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacific Products &amp; Solutions</title>
    <script>
      // Rotate logo -90deg for the favicon
      (function () {
        var img = new Image();
        img.onload = function () {
          var size = 64;
          var c = document.createElement("canvas");
          c.width = size;
          c.height = size;
          var ctx = c.getContext("2d");
          ctx.translate(size / 2, size / 2);
          ctx.rotate(-90 * Math.PI / 180);
          ctx.drawImage(img, -size / 2, -size / 2, size, size);
          var link = document.getElementById("dynamic-favicon");
          if (link) link.href = c.toDataURL("image/png");
        };
        img.src = "/src/image/logo/logo.png";
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
